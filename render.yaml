services:
  - type: web
    name: life-copilot-backend
    env: python
    buildCommand: |
      python3.11 --version || python3 --version || python --version
      python3.11 -m pip install --upgrade pip || python3 -m pip install --upgrade pip
      python3.11 -m pip install --no-cache-dir -r requirements.txt || python3 -m pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: life-copilot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: CORS_ORIGINS
        value: https://your-frontend-url.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: life-copilot-db
    databaseName: lifecopilot
    user: lifecopilot
